<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Igor.Page Engine</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
</head>
<body>
  <div id="header-container"></div>

  <div id="root"></div>

  <div id="footer-container"></div>

  <script>
    // Безопасное создание header без innerHTML
    (function() {
      const headerContainer = document.getElementById('header-container');
      if (headerContainer) {
        const header = document.createElement('header');
        header.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; background: var(--pico-background-color); border-bottom: 1px solid var(--pico-border-color); z-index: 1000;';
        const headerInner = document.createElement('div');
        headerInner.id = 'header-inner';
        headerInner.style.cssText = 'max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 0.75rem; justify-content: flex-end; padding: 0.75rem 1rem;';
        const themeBtn = document.createElement('button');
        themeBtn.id = 'themeBtn';
        themeBtn.className = 'outline secondary';
        themeBtn.style.cssText = 'padding: 0.45rem 0.9rem; font-size: 0.95rem;';
        themeBtn.textContent = 'DARK';
        themeBtn.addEventListener('click', toggleTheme);
        headerInner.appendChild(themeBtn);
        header.appendChild(headerInner);
        headerContainer.appendChild(header);
      }
      
      const footerContainer = document.getElementById('footer-container');
      if (footerContainer) {
        const footer = document.createElement('footer');
        footer.style.cssText = 'position: fixed; bottom: 0; left: 0; width: 100%; background: var(--pico-background-color); border-top: 1px solid var(--pico-border-color); z-index: 1000;';
        const footerInner = document.createElement('div');
        footerInner.id = 'footer-inner';
        footerInner.style.cssText = 'max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; gap: 1rem; padding: 0.75rem 1rem;';
        
        const telegramLink = document.createElement('a');
        telegramLink.href = 'https://t.me/IGOR_CHEVELA';
        telegramLink.className = 'secondary';
        telegramLink.target = '_blank';
        telegramLink.rel = 'noopener noreferrer';
        telegramLink.textContent = 'Telegram';
        footerInner.appendChild(telegramLink);
        
        const githubLink = document.createElement('a');
        githubLink.href = 'https://github.com/igorchevela/igor-page-engine';
        githubLink.className = 'secondary';
        githubLink.target = '_blank';
        githubLink.rel = 'noopener noreferrer';
        githubLink.textContent = 'GitHub';
        footerInner.appendChild(githubLink);
        
        footer.appendChild(footerInner);
        footerContainer.appendChild(footer);
      }
    })();
    window.toggleTheme = function() {
      let mode = parseInt(localStorage.getItem('themeMode'));
      if (isNaN(mode)) mode = 1;
      mode = (mode + 1) % 2;
      localStorage.setItem('themeMode', mode);
      const modes = ["light", "dark"];
      const theme = modes[mode];
      document.documentElement.setAttribute('data-theme', theme);
      document.body.classList.remove('light-theme', 'dark-theme');
      document.body.classList.add(theme + '-theme');
      const btn = document.getElementById('themeBtn');
      if (btn) btn.innerText = theme.toUpperCase();
    };
    // Инициализация темы при загрузке
    (function() {
      let mode = parseInt(localStorage.getItem('themeMode'));
      if (isNaN(mode)) mode = 1;
      const modes = ["light", "dark"];
      const theme = modes[mode];
      document.documentElement.setAttribute('data-theme', theme);
      document.body.classList.remove('light-theme', 'dark-theme');
      document.body.classList.add(theme + '-theme');
      const btn = document.getElementById('themeBtn');
      if (btn) btn.innerText = theme.toUpperCase();
    })();
  </script>
</body>
</html>
