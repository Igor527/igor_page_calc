<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-src 'none';" />
  <title>Igor.Page Engine</title>
  <meta name="description" content="Igor.Page Engine — конструктор калькуляторов, блог и инструменты для автоматизации расчётов." />
</head>
<body>
  <div id="header-container"></div>

  <div id="root"></div>

  <div id="footer-container"></div>

  <script>
    window.toggleTheme = function() {
      var mode = parseInt(localStorage.getItem('themeMode'), 10);
      if (isNaN(mode)) mode = 1;
      mode = (mode + 1) % 2;
      localStorage.setItem('themeMode', mode);
      var theme = mode === 0 ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.classList.toggle('dark', theme === 'dark');
      var btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = theme.toUpperCase();
    };

    (function() {
      var headerContainer = document.getElementById('header-container');
      if (headerContainer) {
        var header = document.createElement('header');
        header.className = 'fixed top-0 left-0 w-full z-[1000] bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700';
        var headerInner = document.createElement('div');
        headerInner.id = 'header-inner';
        headerInner.className = 'max-w-[1200px] mx-auto flex items-center gap-3 justify-end py-3 px-4';
        var linkHome = document.createElement('a');
        linkHome.href = '/';
        linkHome.className = 'px-3 py-1.5 rounded text-sm font-medium border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 no-underline';
        linkHome.textContent = 'На главную';
        headerInner.appendChild(linkHome);
        var linkBack = document.createElement('button');
        linkBack.type = 'button';
        linkBack.className = 'px-3 py-1.5 rounded text-sm font-medium border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer';
        linkBack.textContent = 'Назад';
        linkBack.addEventListener('click', function() { window.history.back(); });
        headerInner.appendChild(linkBack);
        var themeBtn = document.createElement('button');
        themeBtn.id = 'themeBtn';
        themeBtn.className = 'px-3 py-1.5 rounded text-sm font-medium border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer';
        themeBtn.textContent = 'DARK';
        themeBtn.addEventListener('click', window.toggleTheme);
        headerInner.appendChild(themeBtn);
        header.appendChild(headerInner);
        headerContainer.appendChild(header);
      }

      var footerContainer = document.getElementById('footer-container');
      if (footerContainer) {
        var footer = document.createElement('footer');
        footer.className = 'fixed bottom-0 left-0 w-full z-[1000] bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700';
        var footerInner = document.createElement('div');
        footerInner.id = 'footer-inner';
        footerInner.className = 'max-w-[1200px] mx-auto flex justify-center gap-4 py-3 px-4';
        var telegramLink = document.createElement('a');
        telegramLink.href = 'https://t.me/IGOR_CHEVELA';
        telegramLink.className = 'text-gray-600 dark:text-gray-400 hover:underline';
        telegramLink.target = '_blank';
        telegramLink.rel = 'noopener noreferrer';
        telegramLink.textContent = 'Telegram';
        footerInner.appendChild(telegramLink);
        footer.appendChild(footerInner);
        footerContainer.appendChild(footer);
      }
    })();

    (function() {
      var mode = parseInt(localStorage.getItem('themeMode'), 10);
      if (isNaN(mode)) mode = 1;
      var theme = mode === 0 ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.classList.toggle('dark', theme === 'dark');
      var btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = theme.toUpperCase();
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
