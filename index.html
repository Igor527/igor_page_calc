<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2937" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Igor.Page" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https://api.github.com https://api.mistral.ai https://*.googleapis.com https://docs.google.com https://*.firebaseio.com wss://*.firebaseio.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://accounts.google.com https://*.firebaseapp.com https://*.github.com; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com https://*.google.com;" />
  <title>Igor.Page Engine</title>
  <meta name="description" content="Igor.Page Engine — конструктор калькуляторов, блог и инструменты для автоматизации расчётов." />
  <!-- Тема до первого кадра (убирает мелькание light→dark) -->
  <script>
    (function(){var m=parseInt(localStorage.getItem('themeMode'),10);if(isNaN(m))m=1;var theme=m===0?'light':'dark';document.documentElement.setAttribute('data-theme',theme);document.documentElement.classList.toggle('dark',theme==='dark');})();
  </script>
  <!-- Критический CSS: шапка/подвал и контентная область с первого кадра (best practice) -->
  <style>
    body{margin:0;min-height:100vh;background:#f9fafb;color:#1f2937;}
    html.dark body{background:#111827;color:#f3f4f6;}
    #root{padding-top:112px;padding-bottom:56px;min-height:100vh;box-sizing:border-box;}
    #header-container header{position:fixed;top:0;left:0;right:0;z-index:1000;background:#fff;border-bottom:1px solid #e5e7eb;padding-top:env(safe-area-inset-top,0);}
    html.dark #header-container header{background:#111827;border-color:#374151;}
    #header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;justify-content:flex-end;padding:12px 16px;}
    #header-container a,#header-container button{display:inline-block;padding:6px 12px;font-size:14px;font-weight:500;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#374151;text-decoration:none;cursor:pointer;}
    #header-container a:hover,#header-container button:hover{background:#f9fafb;}
    html.dark #header-container a,html.dark #header-container button{background:#1f2937;border-color:#4b5563;color:#e5e7eb;}
    html.dark #header-container a:hover,html.dark #header-container button:hover{background:#374151;}
    #footer-container footer{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-top:1px solid #e5e7eb;padding-bottom:env(safe-area-inset-bottom,0);}
    html.dark #footer-container footer{background:#111827;border-color:#374151;}
    #footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:center;gap:16px;padding:12px 16px;}
    #footer-container a{color:#4b5563;text-decoration:none;}
    #footer-container a:hover{text-decoration:underline;}
    html.dark #footer-container a{color:#9ca3af;}
  </style>
  <link rel="preload" href="/src/index.css" as="style" />
  <link rel="stylesheet" href="/src/index.css" />
</head>
<body>
  <div id="header-container"></div>

  <div id="root"></div>

  <div id="footer-container"></div>

  <script>
    window.toggleTheme = function() {
      var mode = parseInt(localStorage.getItem('themeMode'), 10);
      if (isNaN(mode)) mode = 1;
      mode = (mode + 1) % 2;
      localStorage.setItem('themeMode', mode);
      var theme = mode === 0 ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.classList.toggle('dark', theme === 'dark');
      var btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = theme.toUpperCase();
    };

    (function() {
      var headerContainer = document.getElementById('header-container');
      if (headerContainer) {
        var header = document.createElement('header');
        header.className = 'fixed top-0 left-0 w-full z-[1000] bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700';
        var headerInner = document.createElement('div');
        headerInner.id = 'header-inner';
        headerInner.className = 'max-w-[1200px] mx-auto flex items-center gap-3 justify-end py-3 px-4';
        var linkHome = document.createElement('a');
        linkHome.href = '/';
        linkHome.className = 'px-3 py-1.5 rounded text-sm font-medium border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 no-underline';
        linkHome.textContent = 'На главную';
        headerInner.appendChild(linkHome);
        var linkBack = document.createElement('button');
        linkBack.type = 'button';
        linkBack.className = 'px-3 py-1.5 rounded text-sm font-medium border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer';
        linkBack.textContent = 'Назад';
        linkBack.addEventListener('click', function() { window.history.back(); });
        headerInner.appendChild(linkBack);
        var themeBtn = document.createElement('button');
        themeBtn.id = 'themeBtn';
        themeBtn.className = 'px-3 py-1.5 rounded text-sm font-medium border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer';
        themeBtn.textContent = 'DARK';
        themeBtn.addEventListener('click', window.toggleTheme);
        headerInner.appendChild(themeBtn);
        header.appendChild(headerInner);
        headerContainer.appendChild(header);
      }

      var footerContainer = document.getElementById('footer-container');
      if (footerContainer) {
        var footer = document.createElement('footer');
        footer.className = 'fixed bottom-0 left-0 w-full z-[1000] bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700';
        var footerInner = document.createElement('div');
        footerInner.id = 'footer-inner';
        footerInner.className = 'max-w-[1200px] mx-auto flex justify-center gap-4 py-3 px-4';
        var telegramLink = document.createElement('a');
        telegramLink.href = 'https://t.me/igor_chevela';
        telegramLink.className = 'text-gray-600 dark:text-gray-400 hover:underline';
        telegramLink.target = '_blank';
        telegramLink.rel = 'noopener noreferrer';
        telegramLink.textContent = 'telegram';
        footerInner.appendChild(telegramLink);
        var emailLink = document.createElement('a');
        emailLink.href = 'mailto:hello@urbanplanner.page';
        emailLink.className = 'text-gray-600 dark:text-gray-400 hover:underline';
        emailLink.textContent = 'hello@urbanplanner.page';
        footerInner.appendChild(emailLink);
        footer.appendChild(footerInner);
        footerContainer.appendChild(footer);
      }
    })();

    (function() {
      var mode = parseInt(localStorage.getItem('themeMode'), 10);
      if (isNaN(mode)) mode = 1;
      var theme = mode === 0 ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.classList.toggle('dark', theme === 'dark');
      var btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = theme.toUpperCase();
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
