# Сборка и публикация сайта на GitHub Pages.
# Секреты: либо один ENV_FILE (скопируйте в него всё содержимое .env), либо отдельные VITE_*.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
      VITE_ADMIN_GITHUB_IDS: ${{ secrets.VITE_ADMIN_GITHUB_IDS }}
      VITE_MISTRAL_API_KEY: ${{ secrets.VITE_MISTRAL_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Вариант: один секрет ENV_FILE с полным содержимым .env (строки вида VITE_XXX=значение)
      - name: Create .env from ENV_FILE secret
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_CONTENT" ]; then
            echo "$ENV_CONTENT" > .env
            echo "VITE_SECRET_LOADED=yes" >> .env
          fi

      - name: Diagnose .env (no secrets printed)
        run: |
          if [ -f .env ]; then
            echo "::notice:: .env exists, lines=$(wc -l < .env), VITE_* vars=$(grep -c '^VITE_' .env 2>/dev/null || echo 0)"
          else
            echo "::warning:: .env NOT created — ENV_FILE secret is empty or not set. Add it in repo Settings → Secrets → Actions (name exactly: ENV_FILE)."
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # GitHub Pages без специального сервера не умеет SPA-роутинг — запросы к /welcome_me и т.д. отдадут 404.
      # Копируем index.html в 404.html: при 404 GitHub Pages отдаёт 404.html, и SPA загрузится.
      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
